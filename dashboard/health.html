<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCRYING CHAMBER | Health Monitoring</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Roboto+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-obsidian: #0a0a0c;
            --glass-gold: rgba(218, 165, 32, 0.1);
            --neon-gold: #daa520;
            --neon-red: #ff3131;
            --neon-green: #39ff14;
            --console-font: 'Roboto Mono', monospace;
            --title-font: 'Cinzel', serif;
        }

        body {
            background-color: var(--bg-obsidian);
            color: #ccc;
            font-family: var(--console-font);
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        header {
            border-bottom: 2px solid var(--neon-gold);
            padding-bottom: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-family: var(--title-font);
            color: var(--neon-gold);
            margin: 0;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(218, 165, 32, 0.5);
        }

        .master-clock {
            background: rgba(218, 165, 32, 0.05);
            border: 1px solid var(--neon-gold);
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(218, 165, 32, 0.1);
        }

        .clock-data {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
        }

        .clock-item label {
            display: block;
            font-size: 10px;
            color: var(--neon-gold);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .clock-item span {
            font-size: 18px;
            font-weight: bold;
        }

        .monolith-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .monolith-card {
            background: #121214;
            border: 1px solid #333;
            padding: 20px;
            position: relative;
            transition: all 0.3s ease;
        }

        .monolith-card:hover {
            border-color: var(--neon-gold);
            box-shadow: 0 0 15px rgba(218, 165, 32, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #222;
            padding-bottom: 5px;
        }

        .source-title {
            font-family: var(--title-font);
            font-size: 16px;
            color: #eee;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.healthy {
            background: var(--neon-green);
            box-shadow: 0 0 8px var(--neon-green);
            animation: pulse-green 2s infinite;
        }

        .status-dot.stale {
            background: var(--neon-red);
            box-shadow: 0 0 8px var(--neon-red);
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-green {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }

            100% {
                opacity: 1;
            }
        }

        @keyframes pulse-red {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }

            100% {
                opacity: 1;
            }
        }

        .vital-line {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 8px;
        }

        .vital-label {
            color: #666;
            text-transform: uppercase;
        }

        .vital-value {
            color: #fff;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-obsidian);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 0.5s;
        }
    </style>
</head>

<body>
    <div id="loading" class="loading-overlay">Scrying the ether...</div>

    <header>
        <h1>SCRYING CHAMBER</h1>
        <div id="timestamp" style="font-size: 12px; color: #555;">[BOOT_SEQUENCE_COMPLETE]</div>
    </header>

    <div class="master-clock">
        <div class="clock-item" style="flex: 1;">
            <label>Master Clock</label>
            <span style="font-family: var(--title-font); color: var(--neon-gold); font-size: 24px;">CALDEAN CYCLE</span>
        </div>
        <div class="clock-data">
            <div class="clock-item">
                <label>Last Run</label>
                <span id="last-run">--:--</span>
            </div>
            <div class="clock-item">
                <label>Next Run</label>
                <span id="next-run">--:--</span>
            </div>
            <div class="clock-item">
                <label>System Mode</label>
                <span id="system-mode">ACTIVE</span>
            </div>
        </div>
    </div>

    <div class="monolith-grid" id="monolith-grid">
        <!-- Cards injected here -->
    </div>

    <script>
        const API_BASE = "https://us-central1-dnd-trends-index.cloudfunctions.net/bouncer-api";

        async function init() {
            try {
                // Discover API URL from local storage or app.js pattern
                let apiUrl = API_BASE;
                // If this is running in GCS, app.js might have a dynamic detection

                const response = await fetch(`${apiUrl}/system/health`);
                const data = await response.json();

                renderHealth(data);
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').remove(), 500);
            } catch (err) {
                console.error("Scrying failed:", err);
                document.getElementById('loading').innerText = "ERROR: INTERFACE_COLLAPSE";
            }
        }

        function renderHealth(data) {
            // Master Clock
            const cycle = data.caldean_cycle;
            document.getElementById('last-run').innerText = new Date(cycle.last_run).toLocaleTimeString();
            document.getElementById('next-run').innerText = new Date(cycle.next_run).toLocaleTimeString();
            document.getElementById('system-mode').innerText = cycle.mode ? cycle.mode.toUpperCase() : "ACTIVE";
            if (cycle.mode && cycle.mode.includes("Pause")) {
                document.getElementById('system-mode').style.color = 'var(--neon-gold)';
            } else {
                document.getElementById('system-mode').style.color = 'var(--neon-green)';
            }

            // Monoliths
            const grid = document.getElementById('monolith-grid');
            grid.innerHTML = '';

            const sources = data.sources;
            Object.keys(sources).sort().forEach(src => {
                const info = sources[src];
                const card = document.createElement('div');
                card.className = 'monolith-card';

                const isHealthy = info.status.includes('🟢');
                const lastMod = info.last_modified ? new Date(info.last_modified).toLocaleString() : 'NEVER';

                const bqLink = `https://console.cloud.google.com/bigquery?project=dnd-trends-index&p=dnd-trends-index&d=${info.table_id.includes('.') ? info.table_id.split('.')[0] : 'dnd_trends_raw'}&t=${info.table_id.includes('.') ? info.table_id.split('.')[1] : info.table_id}&page=table`;

                card.innerHTML = `
                    <div class="card-header">
                        <a href="${bqLink}" target="_blank" class="source-title" style="text-decoration: none; color: inherit; cursor: pointer;">${src.toUpperCase()} 🔗</a>
                        <div class="status-dot ${isHealthy ? 'healthy' : 'stale'}"></div>
                    </div>
                    <div class="vital-line">
                        <span class="vital-label">Table</span>
                        <span class="vital-value">${info.table_id || 'N/A'}</span>
                    </div>
                    <div class="vital-line">
                        <span class="vital-label">Row Count</span>
                        <span class="vital-value">${info.row_count.toLocaleString()}</span>
                    </div>
                    <div class="vital-line">
                        <span class="vital-label">Last Scribed</span>
                        <span class="vital-value">${lastMod}</span>
                    </div>
                    <div class="vital-line">
                        <span class="vital-label">Status</span>
                        <span class="vital-value" style="color: ${isHealthy ? 'var(--neon-green)' : 'var(--neon-red)'}">${info.status.replace('🟢 ', '').replace('🔴 ', '')}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        init();
        setInterval(init, 30000); // Pulse check every 30s
    </script>
</body>

</html>
