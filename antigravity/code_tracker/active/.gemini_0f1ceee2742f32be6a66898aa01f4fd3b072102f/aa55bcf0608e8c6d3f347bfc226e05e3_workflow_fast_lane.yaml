main:
  steps:
    - init:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - location: "us-central1"

    # Parallel Execution of Daily Scrapers
    - run_scrapers_parallel:
        parallel:
          branches:
            - reddit:
                steps:
                  - call_reddit:
                      call: http.post
                      args:
                        url: "https://us-central1-${project_id}.cloudfunctions.net/reddit_harvester"
                        auth:
                          type: OIDC
                      result: reddit_result

            - fandom:
                steps:
                  - call_fandom:
                      call: http.post
                      args:
                        url: "https://us-central1-${project_id}.cloudfunctions.net/fandom_scraper"
                        auth:
                          type: OIDC
                      result: fandom_result

            - youtube:
                steps:
                  - call_youtube:
                      call: http.post
                      args:
                        url: "https://us-central1-${project_id}.cloudfunctions.net/youtube_listener"
                        auth:
                          type: OIDC
                      result: youtube_result
            
            - wikipedia:
                steps:
                  - call_wikipedia:
                      call: http.post
                      args:
                        url: "https://us-central1-${project_id}.cloudfunctions.net/wikipedia_scraper"
                        auth:
                          type: OIDC
                      result: wiki_result

    - return_results:
        return: "Fast Lane Complete"
