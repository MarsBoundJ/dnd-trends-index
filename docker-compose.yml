version: '3.8'

services:
  # The Python environment for running scrapers, cleaners, and the discovery bot
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: dnd-trends-backend
    volumes:
      - .:/app
      # Mount Google Cloud Credentials from host to container
      # Replace 'path/to/your/key.json' in your .env file with the actual path
      - ${GOOGLE_APPLICATION_CREDENTIALS_HOST:-./key.json}:/app/gcp-key.json
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-key.json
      - PROJECT_ID=dnd-trends-index
    stdin_open: true # Allows for interactive shell
    tty: true

  # A simple web server to serve the dashboard locally
  dashboard:
    image: python:3.11-slim
    container_name: dnd-trends-dashboard
    volumes:
      - ./dashboard:/app
    working_dir: /app
    ports:
      - "8080:8000"
    command: python -m http.server 8000
